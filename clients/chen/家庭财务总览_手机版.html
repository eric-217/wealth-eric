// ===== 构建菜单 =====
var menu=document.getElementById('menu'), submenu=document.getElementById('submenu'), container=document.getElementById('container');

mainMenu.forEach(function(m){
  var btn=document.createElement('button');
  btn.textContent=m.label; btn.id='btn_'+m.id;
  btn.onclick=function(){ switchMain(m.id); };
  menu.appendChild(btn);
});

// 创建所有卡片
var allIds=[];
mainMenu.forEach(function(m){
  allIds.push(m.id);
  if(m.hasSub && m.sub){ m.sub.forEach(function(s){ allIds.push(s.id); }); }
});

allIds.forEach(function(id){
  var card=document.createElement('div');
  card.className='card'; card.id='card_'+id;
  card.innerHTML=panels[id]||'';
  container.appendChild(card);
});

var currentMain=null, currentSub=null;

function switchMain(mainId){
  currentMain=mainId;

  // 更新主菜单
  document.querySelectorAll('#menu button').forEach(function(b){b.classList.remove('active');});
  document.getElementById('btn_'+mainId).classList.add('active');

  // 子菜单
  submenu.innerHTML='';
  var m=mainMenu.find(function(x){return x.id===mainId;});
  if(m&&m.hasSub&&m.sub){
    submenu.style.display='block';
    m.sub.forEach(function(s){
      var sb=document.createElement('button');
      sb.textContent=s.label; sb.id='sbtn_'+s.id;
      sb.onclick=function(){ switchSub(s.id); };
      submenu.appendChild(sb);
    });
    switchSub(defaultSub[mainId]||m.sub[0].id);
  }else{
    submenu.style.display='none';
    switchSub(mainId);
  }
}

function switchSub(id){
  currentSub=id;
  // 隐藏所有卡片
  document.querySelectorAll('.card').forEach(function(c){c.classList.remove('active');});
  // 显示当前
  var card=document.getElementById('card_'+id);
  if(card){card.classList.add('active');}

  // 更新子菜单
  document.querySelectorAll('#submenu button').forEach(function(b){b.classList.remove('active');});
  var sb=document.getElementById('sbtn_'+id);
  if(sb)sb.classList.add('active');

  // 如果当前显示overview，初始化图表
  if(id==='overview') setTimeout(initCharts,100);
}
