.c{padding:10px}
.card{background:#fff;border-radius:12px;padding:18px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}

.date-tag{font-size:12px;color:#888;margin-bottom:12px;padding:4px 10px;background:#f0f4f8;border-radius:4px;display:inline-block}
.krow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.krow.wide{grid-template-columns:1fr 1fr 1fr}
.kbox{background:#f8fafc;border:1px solid #e2e6ea;border-radius:8px;padding:12px;text-align:center;cursor:default}
.kbox .kl{font-size:11px;color:#889;margin-bottom:4px}
.kbox .kv{font-size:20px;font-weight:700}
.kbox .kv.g{color:#16a34a}.kbox .kv.r{color:#dc2626}.kbox .kv.b{color:#2563eb}.kbox .kv.a{color:#d97706}
.kbox .sub{font-size:11px;color:#999;margin-top:2px}
.chart-wrap{position:relative;width:100%;max-width:340px;margin:8px auto}
.chart-wrap canvas{width:100%!important;height:auto!important}
.chart-legend{font-size:11px;color:#666;line-height:1.6;margin-top:4px}
.chart-legend span{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
th{background:#1a3a5c;color:#fff;padding:8px 6px;font-size:11px;text-align:left;border:1px solid #1a3a5c}
td{padding:7px 6px;border:1px solid #ddd;font-size:12px}
td.tr{text-align:right}
tr:nth-child(even){background:#fafafa}
tr.tt{font-weight:700;background:#f0f4f8;border-top:2px solid #1a3a5c}
tr.warn{background:#fef2f2}
tr.done{color:#aaa;text-decoration:line-through}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:6px -4px;padding:0 4px}
.tbl-wrap table{min-width:500px}
.nt{font-size:12px;color:#888;padding:8px;background:#f8fafc;border-radius:6px;margin-top:8px}
.bg{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;background:#f0fdf4;color:#16a34a}
.ba{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;background:#fefce8;color:#d97706}
.br{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;background:#fef2f2;color:#dc2626}
.summary-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}

.summary-item .sv{font-size:18px;font-weight:700;margin-top:2px}
footer{text-align:center;font-size:11px;color:#aaa;padding:16px}

// Init
var keys=['dashboard','assets','debt','income','expense','expense_plan','cashflow_asset','cashflow_monthly','insurance_cf','forecast10','freedom'];
var labels={dashboard:'总览',assets:'资产',debt:'负债',income:'收入',expense:'支出',expense_plan:'计划',cashflow_asset:'固收流',cashflow_monthly:'月现金',insurance_cf:'保单流',forecast10:'10年',freedom:'自由'};
var menu=document.getElementById('menu');
var container=document.querySelector('.c');

keys.forEach(function(k){
var btn=document.createElement('button');
btn.textContent=labels[k];
btn.onclick=function(){showMobile(k)};
if(k==='dashboard')btn.classList.add('active');
menu.appendChild(btn);
var div=document.createElement('div');div.className='card';div.id=k;div.style.display=k==='dashboard'?'block':'none';
div.innerHTML='<h2>'+labels[k]+'</h2>'+panels[k];
container.appendChild(div);
});

function showMobile(id){
document.querySelectorAll('.card').forEach(function(c){c.style.display='none'});
document.querySelectorAll('.menu button').forEach(function(b){b.classList.remove('active')});
document.getElementById(id).style.display='block';
var btns=document.querySelectorAll('.menu button');
btns.forEach(function(b){if(b.textContent===labels[id])b.classList.add('active')});
}

// Password
function checkPwd(){
var v=document.getElementById('pw').value;
if(v===PW){document.getElementById('lock').classList.add('hidden');document.getElementById('app').style.display='block';initCharts();}
else{document.getElementById('err').style.display='block';setTimeout(function(){document.getElementById('err').style.display='none'},2000);}
}

// Charts - only init when dashboard is visible
var chartsInitialized=false;
function initCharts(){
if(chartsInitialized||!document.getElementById('chartAssets'))return;
chartsInitialized=true;

// 1. 总资产 → 环形图（不含零值分类）
new Chart(document.getElementById('chartAssets'),{
type:'doughnut',
data:{labels:['固收理财','保险现金价值','私募股权','房产','港险','银行存款'],
datasets:[{data:[480,324,285,270,72,53],
backgroundColor:['#2563eb','#7c3aed','#16a34a','#d97706','#dc2626','#0891b2']}]},
options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12,usePointStyle:true}}}}
});

// 2. 总负债 → 极地图（3类机构，面积对比直观）
new Chart(document.getElementById('chartDebt'),{
type:'polarArea',
data:{labels:['保险公司(新华)','银行(车贷)','网贷平台'],
datasets:[{data:[600,63,46],
backgroundColor:['rgba(220,38,38,0.6)','rgba(37,99,235,0.6)','rgba(217,119,6,0.6)'],
borderColor:['#dc2626','#2563eb','#d97706'],borderWidth:2}]},
options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12,usePointStyle:true}}}}
});

// 3. 被动收入 → 横向柱状图（不含零值）
new Chart(document.getElementById('chartIncome'),{
type:'bar',
data:{labels:['固收利息','保险生存金','万能账户增值','保险CV增值','保险分红','财富年年生存金'],
datasets:[{data:[523,36,11,15,3,1.7],
backgroundColor:['#2563eb','#7c3aed','#16a34a','#0891b2','#d97706','#eab308'],
borderRadius:4}]},
options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},
scales:{x:{title:{display:true,text:'千元/年',font:{size:10}},ticks:{font:{size:10}}},
y:{ticks:{font:{size:10}}}}}
});

// 4. 保险分类 → 饼图（6类份数分布，经典圆形）
new Chart(document.getElementById('chartInsType'),{
type:'pie',
data:{labels:['养老收入型','满期返还型','终身增值型','灵活账户型'],
datasets:[{data:[3,2,2,1],
backgroundColor:['#2563eb','#7c3aed','#16a34a','#d97706','#eab308','#dc2626']}]},
options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:10,usePointStyle:true}}}}
});
}

// If already logged in (session), init charts
if(sessionStorage.getItem('fa')==='1'){
document.getElementById('lock').classList.add('hidden');
document.getElementById('app').style.display='block';
setTimeout(initCharts,300);
}

// Also re-init charts when switching to dashboard
var origShow=showMobile;
showMobile=function(id){
origShow(id);
if(id==='dashboard')setTimeout(initCharts,100);
};
</script>
