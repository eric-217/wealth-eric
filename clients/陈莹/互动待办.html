<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>互动待办</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222;font-size:14px;padding:12px}
.back{display:inline-block;padding:6px 14px;background:#1a3a5c;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;margin-bottom:12px}
h2{font-size:17px;color:#1a3a5c;margin-bottom:10px}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.card h3{font-size:14px;color:#1a3a5c;margin-bottom:10px}
.task{display:flex;align-items:flex-start;padding:10px 8px;border-bottom:1px solid #f0f0f0;gap:10px;cursor:pointer}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:22px;height:22px;margin-top:2px;flex-shrink:0;accent-color:#16a34a}
.task .tb{flex:1}
.task .tbt{font-weight:600;font-size:13px}
.task .tbd{font-size:11px;color:#888;margin-top:2px}
.task.done .tbt{text-decoration:line-through;color:#999}
.refresh{font-size:12px;color:#888;margin-top:12px;text-align:center}
</style>
</head>
<body>
<a href="菜单.html" class="back">← 返回菜单</a>

<h2>待办事项 · 完成后勾选</h2>
<div class="card">
<h3>保单操作确认</h3>
<div id="tasks"></div>
<div class="refresh">✅ 勾选后自动保存。完成后请告知您的理财顾问。</div>
</div>

<div class="card">
<h3>意见和建议</h3>
<iframe id="feedback-form" src="about:blank" width="100%" height="520" frameborder="0" style="border:none;border-radius:8px"></iframe>
<div class="refresh" style="margin-top:4px">您的建议将直接发送给理财顾问。</div>
</div>

<script>
var todos=[
{id:1, text:'新华惠鑫宝 — 确认投保人变更材料已提交', detail:'携带死亡证明+身份证+保单原件到新华柜面'},
{id:2, text:'确认众享淳盈60期(¥300,000)到期到账', detail:'8月到期，确认本金+利息¥30,600已入账'},
{id:3, text:'确认浩腾恒烨收益权转让计划 Q3利息到账', detail:'9月利息¥7,350'},
{id:4, text:'确认11月新华贷款利息已扣款', detail:'月息¥3,750，每180天扣一次'},
{id:5, text:'确认永明港险第2年保费$15,000已缴', detail:'8月26日前缴费'},
{id:6, text:'确认周大福港险承保状态', detail:'登录周大福APP查询保单状态'},
{id:7, text:'年终复核：确认所有保单现金价值更新', detail:'12月底登录各保司APP查看最新数字'},
{id:8, text:'如有保单分红报告，请转发给理财顾问', detail:'平安钟爱一生/阳光财富年年年底派发红利'},
];

var done=JSON.parse(localStorage.getItem('wm_todos')||'[]');
var fb='';

var html='';
todos.forEach(function(t){
var checked=done.includes(t.id);
html+='<div class="task'+(checked?' done':'')+'" onclick="toggle('+t.id+')">';
html+='<input type=checkbox '+(checked?'checked':'')+' onclick="event.stopPropagation();toggle('+t.id+')">';
html+='<div class=tb><div class=tbt>'+t.text+'</div><div class=tbd>'+t.detail+'</div></div>';
html+='</div>';
});
document.getElementById('tasks').innerHTML=html;

function toggle(id){
var done=JSON.parse(localStorage.getItem('wm_todos')||'[]');
var i=done.indexOf(id);
if(i>=0) done.splice(i,1); else done.push(id);
localStorage.setItem('wm_todos',JSON.stringify(done));
location.reload();
}
</script>
</body>
</html>
