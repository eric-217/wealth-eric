<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>固收现金流 · 模板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222;font-size:14px;padding:12px}
.back{display:inline-block;padding:6px 14px;background:#1a3a5c;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;margin-bottom:12px}
h2{font-size:17px;color:#1a3a5c;margin-bottom:10px}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.card h3{font-size:14px;color:#1a3a5c;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}
th{background:#1a3a5c;color:#fff;padding:6px 8px;font-size:11px;text-align:left}
td{padding:5px 8px;border:1px solid #ddd;font-size:11.5px}
td.r{text-align:right}
tr:nth-child(even){background:#fafafa}
tr.tt{font-weight:700;background:#f0f4f8}
.tbl-wrap{overflow-x:auto}
.green{color:#16a34a}
.hint{background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:10px;margin:8px 0;font-size:12px;color:#92400e}
</style></head><body>
<a href="菜单.html" class="back">← 返回菜单</a>
<h2>固收产品 · 现金流明细</h2>

<div class="card">
<h3>全部产品清单</h3>
<div class="hint">📌 每行一个产品。不需要的列可以删除。</div>
<div class="tbl-wrap"><table>
<tr><th>产品名称</th><th>本金</th><th>利率</th><th>到期日</th><th>付息方式</th></tr>
<tr><td>{{产品名称}}</td><td class="r">¥{{金额}}</td><td class="r">{{利率}}%</td><td>{{日期}}</td><td>{{年度/季度}}</td></tr>
<tr><td>{{产品名称}}</td><td class="r">¥{{金额}}</td><td class="r">{{利率}}%</td><td>{{日期}}</td><td>{{年度/季度}}</td></tr>
<tr class="tt"><td>合计</td><td class="r">¥{{金额}}</td><td></td><td></td><td></td></tr>
</table></div>
</div>

<div class="card">
<h3>按年汇总（示例）</h3>
<div class="hint">📌 每年一行：利息收入 + 到期本金。可扩展为按月明细。</div>
<table>
<tr><th>年份</th><th>利息收入</th><th>到期本金</th></tr>
<tr><td>{{年份}}</td><td class="r">¥{{金额}}</td><td class="r">¥{{金额}}</td></tr>
<tr><td>{{年份}}</td><td class="r">¥{{金额}}</td><td class="r">¥{{金额}}</td></tr>
<tr class="tt"><td>总计</td><td class="r">¥{{金额}}</td><td class="r">¥{{金额}}</td></tr>
</table>
</div>
</body></html>
