<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>待办事项 · 模板</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222;font-size:14px;padding:12px}.back{display:inline-block;padding:6px 14px;background:#1a3a5c;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;margin-bottom:12px}h2{font-size:17px;color:#1a3a5c;margin-bottom:10px}.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}.card h3{font-size:14px;color:#1a3a5c;margin-bottom:10px}.task{display:flex;align-items:flex-start;padding:10px 8px;border-bottom:1px solid #f0f0f0;gap:10px;cursor:pointer}.task:last-child{border-bottom:none}.task input[type=checkbox]{width:22px;height:22px;margin-top:2px;flex-shrink:0;accent-color:#16a34a}.task .tb{flex:1}.task .tbt{font-weight:600;font-size:13px}.task .tbd{font-size:11px;color:#888;margin-top:2px}.task.done .tbt{text-decoration:line-through;color:#999}.msg{font-size:12px;margin-top:8px;text-align:center}.msg.ok{color:#16a34a}textarea{width:100%;height:100px;border:1px solid #ddd;border-radius:8px;padding:12px;font-size:14px;font-family:inherit;resize:vertical;margin-top:8px}.btn{display:block;width:100%;padding:12px;background:#1a3a5c;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}.btn:disabled{opacity:0.5}.hint{background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:10px;margin:8px 0;font-size:12px;color:#92400e}</style></head><body>
<a href="菜单.html" class="back">← 返回菜单</a>
<h2>待办事项 · 完成后勾选</h2>

<div class="hint">📌 分类列出待办。客户勾选后自动保存在本地。建议分"保单""资金""报告"等分类。</div>

<div class="card">
<h3>{{分类名：如"保单操作"}}</h3>
<div class="task"><input type="checkbox"><div class="tb"><div class="tbt">{{保单名}} — {{事项}}</div><div class="tbd">{{补充说明}}</div></div></div>
<div class="task"><input type="checkbox"><div class="tb"><div class="tbt">{{保单名}} — {{事项}}</div><div class="tbd">{{补充说明}}</div></div></div>
</div>

<div class="card">
<h3>{{分类名：如"资金与账务"}}</h3>
<div class="task"><input type="checkbox"><div class="tb"><div class="tbt">{{事项}}</div><div class="tbd">{{补充说明}}</div></div></div>
</div>

<div class="card">
<h3>意见和建议</h3>
<textarea id="msg" placeholder="请在此写下您的建议、问题或需求..."></textarea>
<button class="btn" id="send-btn" onclick="alert('请配置 API 端点')">发送给理财顾问用于更新数据</button>
<div class="msg" id="fb-msg"></div>
</div>

<script>
// 简单勾选保存（localStorage 版本）
var done=JSON.parse(localStorage.getItem('wm_todos')||'[]');
document.querySelectorAll('.task input[type=checkbox]').forEach(function(cb,i){
if(done.includes(i)){cb.checked=true;cb.parentElement.classList.add('done')}
cb.onchange=function(){
if(cb.checked){done.push(i);cb.parentElement.classList.add('done')}
else{done=done.filter(function(x){return x!==i});cb.parentElement.classList.remove('done')}
localStorage.setItem('wm_todos',JSON.stringify(done));
}
});
</script>
</body></html>
