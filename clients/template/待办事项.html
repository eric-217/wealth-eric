<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>待办事项</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222;font-size:14px;padding:12px}
.back{display:inline-block;padding:6px 14px;background:#1a3a5c;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;margin-bottom:12px}
h2{font-size:17px;color:#1a3a5c;margin-bottom:10px}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.card h3{font-size:14px;color:#1a3a5c;margin-bottom:10px}
.task{display:flex;align-items:flex-start;padding:10px 8px;border-bottom:1px solid #f0f0f0;gap:10px}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:22px;height:22px;margin-top:2px;flex-shrink:0;accent-color:#16a34a}
.task .tb{flex:1}
.task .tbt{font-weight:600;font-size:13px}
.task .tbd{font-size:11px;color:#888;margin-top:2px}
.task.done .tbt{text-decoration:line-through;color:#999}
.pl{font-size:12px;color:#ccc;padding:10px 0;text-align:center}
textarea{width:100%;height:100px;border:1px solid #ddd;border-radius:8px;padding:12px;font-size:14px;font-family:inherit;resize:vertical;margin-top:8px}
.btn{display:block;width:100%;padding:12px;background:#1a3a5c;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:disabled{opacity:0.5}
.msg{font-size:12px;margin-top:8px;text-align:center}
.msg.ok{color:#16a34a}
</style>
</head>
<body>
<a href="菜单.html" class="back">← 返回菜单</a>

<h2>待办事项</h2>

<div class="card">
<h3>保单操作</h3>
<div id="tasks1">
<div class="pl">由客户经理全盘分析后填写。此区域默认为空。</div>
</div>
</div>

<div class="card">
<h3>资金与账务</h3>
<div id="tasks2">
<div class="pl">由客户经理全盘分析后填写。此区域默认为空。</div>
</div>
</div>

<div class="card">
<h3>报告与沟通</h3>
<div id="tasks3">
<div class="pl">由客户经理全盘分析后填写。此区域默认为空。</div>
</div>
</div>

<div class="card">
<h3>意见和建议</h3>
<textarea id="msg" placeholder="请在此写下您的建议、问题或需求..."></textarea>
<button class="btn" id="send-btn" onclick="sendFeedback()">发送给理财顾问</button>
<div class="msg" id="fb-msg"></div>
</div>

<script>
// 替换为实际待办数据
// 格式: [{cat:1, text:'事项标题', detail:'补充说明'}]
// cat: 1=保单操作, 2=资金与账务, 3=报告与沟通
var allTodos = [];

var done = JSON.parse(localStorage.getItem('wm_todos') || '[]');

function renderTodos(cat, containerId) {
  var list = allTodos.filter(function(t) { return t.cat === cat; });
  if (list.length === 0) return;
  var h = '';
  list.forEach(function(t) {
    var d = done.indexOf(t.text) >= 0;
    h += '<div class="task' + (d ? ' done' : '') + '" onclick="toggle(\'' + t.text.replace(/'/g, "\\'") + '\')">';
    h += '<input type="checkbox" ' + (d ? 'checked' : '') + ' onclick="event.stopPropagation();toggle(\'' + t.text.replace(/'/g, "\\'") + '\')">';
    h += '<div class="tb"><div class="tbt">' + t.text + '</div>';
    if (t.detail) h += '<div class="tbd">' + t.detail + '</div>';
    h += '</div></div>';
  });
  document.getElementById(containerId).innerHTML = h;
}

function toggle(text) {
  var i = done.indexOf(text);
  if (i >= 0) done.splice(i, 1); else done.push(text);
  localStorage.setItem('wm_todos', JSON.stringify(done));
  renderTodos(1, 'tasks1');
  renderTodos(2, 'tasks2');
  renderTodos(3, 'tasks3');
}

renderTodos(1, 'tasks1');
renderTodos(2, 'tasks2');
renderTodos(3, 'tasks3');

async function sendFeedback() {
  var msg = document.getElementById('msg').value.trim();
  if (!msg) { showMsg('fb-msg', '请输入内容', ''); return; }
  var btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = '发送中...';
  try {
    var r = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    var d = await r.json();
    if (d.ok) {
      showMsg('fb-msg', '已发送给理财顾问', 'ok');
      document.getElementById('msg').value = '';
    } else {
      showMsg('fb-msg', '发送失败，请稍后重试', '');
    }
  } catch(e) { showMsg('fb-msg', '发送失败，请稍后重试', ''); }
  btn.disabled = false; btn.textContent = '发送给理财顾问';
}

function showMsg(id, text, cls) {
  var el = document.getElementById(id);
  el.textContent = text; el.className = 'msg ' + cls;
  setTimeout(function() { el.textContent = ''; el.className = 'msg'; }, 3000);
}
</script>
</body>
</html>
