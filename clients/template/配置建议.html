<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>配置建议 · 模板</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222;font-size:14px;padding:12px}.back{display:inline-block;padding:6px 14px;background:#1a3a5c;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;margin-bottom:12px}h2{font-size:17px;color:#1a3a5c;margin-bottom:10px}.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}.card h3{font-size:14px;color:#1a3a5c;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #eee}table{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}th{background:#1a3a5c;color:#fff;padding:6px;font-size:11px;text-align:left}td{padding:5px 6px;border:1px solid #ddd;font-size:11px}td.r{text-align:right}tr:nth-child(even){background:#fafafa}tr.tt{font-weight:700;background:#f0f4f8}.timeline{margin:10px 0;padding-left:16px;border-left:3px solid #1a3a5c}.timeline .tl{padding:8px 0 8px 14px;position:relative}.timeline .tl::before{content:'';position:absolute;left:-9px;top:14px;width:14px;height:14px;background:#1a3a5c;border-radius:50%}.timeline .tl .tly{font-weight:700;font-size:13px;color:#1a3a5c}.timeline .tl .tld{font-size:12px;color:#555;margin-top:2px}.hint{background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:10px;margin:8px 0;font-size:12px;color:#92400e}</style></head><body>
<a href="菜单.html" class="back">← 返回菜单</a>
<h2>资产配置建议</h2>
<div class="hint">📌 按时间线给出配置建议。每条建议一个 .tl 区块。可分"近1年""近3年""近5年"。</div>

<div class="card">
<h3>当前配置</h3>
<table>
<tr><th>资产类别</th><th>金额</th><th>占比</th></tr>
<tr><td>{{类别}}</td><td class="r">¥{{金额}}</td><td class="r">{{百分比}}%</td></tr>
</table>
</div>

<div class="card">
<h3>近1年建议</h3>
<div class="timeline">
<div class="tl"><div class="tly">{{建议标题}}</div><div class="tld">{{详细说明}}</div></div>
<div class="tl"><div class="tly">{{建议标题}}</div><div class="tld">{{详细说明}}</div></div>
</div>
</div>

<div class="card">
<h3>保险配置建议</h3>
<table>
<tr><th>家庭成员</th><th>已有保障</th><th>建议补充</th><th>年成本</th></tr>
<tr><td>{{成员}}</td><td>{{已有}}</td><td>{{建议}}</td><td class="r">¥{{金额}}</td></tr>
</table>
</div>
</body></html>
