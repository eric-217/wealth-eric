<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>负债明细 · 模板</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222;font-size:14px;padding:12px}.back{display:inline-block;padding:6px 14px;background:#1a3a5c;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;margin-bottom:12px}h2{font-size:17px;color:#1a3a5c;margin-bottom:10px}.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}.card h3{font-size:14px;color:#1a3a5c;margin-bottom:8px}table{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}th{background:#1a3a5c;color:#fff;padding:6px;font-size:11px;text-align:left}td{padding:5px 6px;border:1px solid #ddd;font-size:11px}td.r{text-align:right}tr:nth-child(even){background:#fafafa}tr.tt{font-weight:700;background:#f0f4f8}.hint{background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:10px;margin:8px 0;font-size:12px;color:#92400e}</style></head><body>
<a href="菜单.html" class="back">← 返回菜单</a>
<h2>负债明细</h2>
<div class="hint">📌 每笔负债一个 .card。没有负债则整个页面可删除。</div>

<div class="card">
<h3>总览</h3>
<table>
<tr><th>负债类型</th><th>本金</th><th>月供/利息</th><th>剩余期数</th></tr>
<tr><td>{{如：保单贷款}}</td><td class="r">¥{{金额}}</td><td class="r">¥{{金额}}/月</td><td>{{期数}}</td></tr>
<tr><td>{{如：车贷}}</td><td class="r">¥{{金额}}</td><td class="r">¥{{金额}}/月</td><td>{{期数}}</td></tr>
<tr class="tt"><td>合计</td><td class="r">¥{{金额}}</td><td class="r">¥{{金额}}/月</td><td></td></tr>
</table>
</div>

<div class="card">
<h3>还款计划（示例）</h3>
<table>
<tr><th>阶段</th><th>期数</th><th>金额</th></tr>
<tr><td>{{时间段}}</td><td class="r">{{期数}}期</td><td class="r">¥{{金额}}</td></tr>
</table>
</div>
</body></html>
