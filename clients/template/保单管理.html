<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>保单管理 · 模板</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222;font-size:14px;padding:12px}.back{display:inline-block;padding:6px 14px;background:#1a3a5c;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;margin-bottom:12px}h2{font-size:17px;color:#1a3a5c;margin-bottom:10px}.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}.card h3{font-size:14px;color:#1a3a5c;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #eee}.task{display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:10px}.task:last-child{border-bottom:none}.task .dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}.dot.red{background:#dc2626}.dot.amber{background:#d97706}.dot.blue{background:#2563eb}.dot.green{background:#16a34a}.task .tb{flex:1}.task .tbt{font-weight:600;font-size:13px}.task .tbd{font-size:11.5px;color:#666;margin-top:2px}.hint{background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:10px;margin:8px 0;font-size:12px;color:#92400e}</style></head><body>
<a href="菜单.html" class="back">← 返回菜单</a>
<h2>保单管理 · 近12个月待办</h2>

<div class="card">
<h3>🔴 紧急（本月）</h3>
<div class="task"><div class="dot red"></div><div class="tb"><div class="tbt">{{保单名}} — {{事项}}</div><div class="tbd">{{操作说明}}</div></div></div>
</div>

<div class="card">
<h3>🟡 近期（本季度）</h3>
<div class="task"><div class="dot amber"></div><div class="tb"><div class="tbt">{{保单名}} — {{事项}}</div><div class="tbd">{{操作说明}}</div></div></div>
</div>

<div class="card">
<h3>🔵 常规（年内）</h3>
<div class="task"><div class="dot blue"></div><div class="tb"><div class="tbt">{{保单名}} — 年度复核</div><div class="tbd">查看最新现金价值、红利报告。对比上一年数据。</div></div></div>
</div>

<div class="card">
<h3>港险专项管理（如适用）</h3>
<div class="hint">📌 有港险才显示此板块</div>
<div class="task"><div class="dot blue"></div><div class="tb"><div class="tbt">设置第二投保人</div><div class="tbd">当前投保人单一，建议增设第二投保人避免单点风险。</div></div></div>
<div class="task"><div class="dot blue"></div><div class="tb"><div class="tbt">年度分红实现率复核</div><div class="tbd">对比计划书与实际分红报告，计算实现率。</div></div></div>
</div>

<div class="card">
<h3>🟢 已完成</h3>
<div class="task"><div class="dot green"></div><div class="tb"><div class="tbt">{{保单名}} — {{已完成事项}} ✅</div></div></div>
</div>
</body></html>
